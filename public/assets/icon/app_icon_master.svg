<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2d3a1f"></stop>
      <stop offset="55%" stop-color="#182410"></stop>
      <stop offset="100%" stop-color="#0a0f08"></stop>
    </radialGradient>
    <radialGradient id="helmet" cx="34%" cy="26%" r="78%">
      <stop offset="0%" stop-color="#9ba88d"></stop>
      <stop offset="52%" stop-color="#4a6030"></stop>
      <stop offset="100%" stop-color="#2c3a1d"></stop>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"></rect>

  <!-- crosshair accent -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#c5a97d" stroke-width="10" opacity="0.4"></circle>
  <line x1="512" y1="20" x2="512" y2="140" stroke="#c5a97d" stroke-width="16" opacity="0.6"></line>
  <line x1="512" y1="884" x2="512" y2="1004" stroke="#c5a97d" stroke-width="16" opacity="0.6"></line>
  <line x1="20" y1="512" x2="140" y2="512" stroke="#c5a97d" stroke-width="16" opacity="0.6"></line>
  <line x1="884" y1="512" x2="1004" y2="512" stroke="#c5a97d" stroke-width="16" opacity="0.6"></line>

  <!-- helmet (top-down soldier, matches in-game character sprite style) -->
  <circle cx="512" cy="512" r="290" fill="url(#helmet)" stroke="#1c2711" stroke-width="18"></circle>
  <path d="M290 445 A222 222 0 0 1 734 445" fill="#1c2711" opacity="0.32"></path>
  <ellipse cx="410" cy="380" rx="80" ry="46" fill="#fff" opacity="0.35"></ellipse>

  <!-- visor -->
  <ellipse cx="512" cy="518" rx="105" ry="48" fill="#100a08" opacity="0.72"></ellipse>
  <ellipse cx="475" cy="504" rx="24" ry="12" fill="#fff" opacity="0.42"></ellipse>
</svg>
