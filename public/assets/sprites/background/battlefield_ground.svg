<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="fxBlur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"></feGaussianBlur></filter>
  </defs>

  <!-- v31 fix: flat fill instead of a diagonal gradient/vignette/directional
       lighting — those all vary across the tile itself, so tiling this
       512x512 image edge-to-edge (see GameScene's tileSprite) produced an
       obvious repeating grid of seams. A flat base + a few large, heavily
       blurred, low-opacity patches (no fixed pattern a viewer's eye locks
       onto) reads as one continuous field instead. -->
  <rect width="512" height="512" fill="#43592f"></rect>

  <ellipse cx="120" cy="150" rx="150" ry="110" fill="#3d5129" opacity="0.35" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="400" cy="360" rx="160" ry="120" fill="#4a6234" opacity="0.3" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="330" cy="90" rx="100" ry="80" fill="#3d5129" opacity="0.25" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="90" cy="420" rx="110" ry="90" fill="#4a6234" opacity="0.28" filter="url(#fxBlur2)"></ellipse>

  <ellipse cx="122" cy="70" rx="3" ry="2" fill="#2e4020" opacity="0.4"></ellipse>
  <ellipse cx="233" cy="415" rx="3" ry="2" fill="#556b3e" opacity="0.4"></ellipse>
  <ellipse cx="441" cy="169" rx="2.5" ry="1.7" fill="#2e4020" opacity="0.4"></ellipse>
  <ellipse cx="111" cy="497" rx="2" ry="1.4" fill="#556b3e" opacity="0.4"></ellipse>
  <ellipse cx="49" cy="333" rx="2.2" ry="1.5" fill="#2e4020" opacity="0.4"></ellipse>
</svg>
