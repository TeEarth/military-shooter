<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs><filter id="fxBlur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter><filter id="fxBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.6"></feGaussianBlur></filter>
