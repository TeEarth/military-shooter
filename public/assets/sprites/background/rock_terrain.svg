<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="rockPattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#5a534a"/>
      <rect width="80" height="80" fill="#4d473f" opacity="0.4"/>
      <polygon points="10,10 22,6 30,16 20,24" fill="#6b6259" opacity="0.6"/>
      <polygon points="50,20 66,14 72,28 56,34" fill="#403a33" opacity="0.55"/>
      <polygon points="35,50 48,44 56,58 40,64" fill="#6b6259" opacity="0.5"/>
      <polygon points="4,60 16,56 20,70 6,74" fill="#403a33" opacity="0.5"/>
      <circle cx="66" cy="60" r="4" fill="#7a7166" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#rockPattern)"/>

  <!-- large boulders scattered for variation -->
  <ellipse cx="110" cy="150" rx="55" ry="34" fill="#3a352e" opacity="0.55"/>
  <ellipse cx="390" cy="340" rx="70" ry="42" fill="#3a352e" opacity="0.5"/>
  <ellipse cx="300" cy="90" rx="40" ry="24" fill="#3a352e" opacity="0.4"/>
  <ellipse cx="160" cy="420" rx="60" ry="30" fill="#3a352e" opacity="0.45"/>

  <!-- cracked stone path -->
  <path d="M0 270 Q150 230 260 280 T512 260" stroke="#241f1a" stroke-width="10" fill="none" opacity="0.5"/>
  <path d="M60 0 Q80 120 60 260" stroke="#241f1a" stroke-width="6" fill="none" opacity="0.35"/>
  <path d="M420 512 Q440 380 400 240" stroke="#241f1a" stroke-width="6" fill="none" opacity="0.35"/>

  <!-- scattered rubble -->
  <g fill="#2a2521" opacity="0.65">
    <circle cx="80" cy="380" r="9"/>
    <circle cx="96" cy="394" r="6"/>
    <circle cx="430" cy="140" r="8"/>
    <circle cx="210" cy="440" r="7"/>
    <circle cx="450" cy="460" r="10"/>
    <circle cx="260" cy="180" r="6"/>
  </g>
</svg>
