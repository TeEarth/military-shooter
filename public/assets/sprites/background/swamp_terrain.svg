  <ellipse cx="90" cy="410" rx="70" ry="38" fill="#1a2e33" opacity="0.65" filter="url(#fxBlur2)"></ellipse>

  <ellipse cx="122" cy="70" rx="5" ry="3.5" fill="#14201a" opacity="0.5"></ellipse>
  <ellipse cx="232" cy="415" rx="5" ry="3.5" fill="#4a5c38" opacity="0.45"></ellipse>
  <ellipse cx="440" cy="169" rx="4.5" ry="3.1" fill="#14201a" opacity="0.5"></ellipse>
  <ellipse cx="409" cy="111" rx="3" ry="2.1" fill="#4a5c38" opacity="0.5"></ellipse>
  <ellipse cx="289" cy="39" rx="2.3" ry="1.6" fill="#14201a" opacity="0.55"></ellipse>
  <ellipse cx="129" cy="274" rx="1.9" ry="1.3" fill="#4a5c38" opacity="0.55"></ellipse>
  <ellipse cx="459" cy="437" rx="2.9" ry="2" fill="#14201a" opacity="0.45"></ellipse>
