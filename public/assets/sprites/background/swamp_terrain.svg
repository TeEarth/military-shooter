<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs><filter id="fxBlur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter><filter id="fxBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.6"></feGaussianBlur></filter>
    <linearGradient id="baseSwamp" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#3a4a2e"></stop>
      <stop offset="50%" stop-color="#2c3b24"></stop>
      <stop offset="100%" stop-color="#1c2a18"></stop>
    </linearGradient>
    <filter id="bumpW" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="4" seed="52" result="n"></feTurbulence>
      <feDiffuseLighting in="n" lighting-color="#ffffff" surfaceScale="3" diffuseConstant="1.05">
        <feDistantLight azimuth="235" elevation="43"></feDistantLight>
      </feDiffuseLighting>
    </filter>
    <radialGradient id="vignetteW" cx="50%" cy="39%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"></stop>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"></stop>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#baseSwamp)"></rect>

  
  <ellipse cx="140" cy="150" rx="85" ry="45" fill="#1a2e33" opacity="0.75" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="390" cy="330" rx="100" ry="55" fill="#1a2e33" opacity="0.72" filter="url(#fxBlur2)"></ellipse>
