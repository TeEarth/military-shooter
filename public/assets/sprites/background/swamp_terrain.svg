  <ellipse cx="33" cy="392" rx="4" ry="2.8" fill="#14201a" opacity="0.5"></ellipse>

  <rect width="512" height="512" fill="#808080" filter="url(#bumpW)" opacity="0.14" style="mix-blend-mode:overlay"></rect>
  <rect width="512" height="512" fill="url(#vignetteW)"></rect>
