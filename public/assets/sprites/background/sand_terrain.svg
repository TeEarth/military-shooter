<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="fxBlur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"></feGaussianBlur></filter>
  </defs>

  <!-- v31 fix: see battlefield_ground.svg — flat fill instead of a gradient/
       vignette/directional lighting, which all showed up as an obvious
       repeating seam once this 512x512 tile repeats across the whole stage. -->
  <rect width="512" height="512" fill="#8a7548"></rect>

  <ellipse cx="120" cy="150" rx="150" ry="110" fill="#7c6840" opacity="0.35" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="400" cy="360" rx="160" ry="120" fill="#96814f" opacity="0.3" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="330" cy="90" rx="100" ry="80" fill="#7c6840" opacity="0.25" filter="url(#fxBlur2)"></ellipse>
  <ellipse cx="90" cy="420" rx="110" ry="90" fill="#96814f" opacity="0.28" filter="url(#fxBlur2)"></ellipse>

  <ellipse cx="122" cy="70" rx="3" ry="2" fill="#4a3d25" opacity="0.45"></ellipse>
  <ellipse cx="232" cy="415" rx="3" ry="2" fill="#c0aa78" opacity="0.4"></ellipse>
  <ellipse cx="440" cy="169" rx="2.5" ry="1.7" fill="#5c4c2e" opacity="0.4"></ellipse>
  <ellipse cx="111" cy="497" rx="2" ry="1.4" fill="#4a3d25" opacity="0.45"></ellipse>
  <ellipse cx="49" cy="333" rx="2.2" ry="1.5" fill="#4a3d25" opacity="0.4"></ellipse>

  <!-- sun-bleached bone/skull hint — kept subtle and small so it doesn't
       read as an obvious repeating shape when tiled. -->
  <ellipse cx="410" cy="440" rx="20" ry="6" fill="#e0d0a0" opacity="0.25" filter="url(#fxBlur2)"></ellipse>
</svg>
