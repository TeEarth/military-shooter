<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseSand" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#a8905f"></stop>
      <stop offset="50%" stop-color="#8f7a4d"></stop>
      <stop offset="100%" stop-color="#6e5c39"></stop>
    </linearGradient>
    <filter id="bumpS" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.042" numOctaves="4" seed="31" result="n"></feTurbulence>
      <feDiffuseLighting in="n" lighting-color="#ffffff" surfaceScale="3.4" diffuseConstant="1.12">
        <feDistantLight azimuth="235" elevation="43"></feDistantLight>
      </feDiffuseLighting>
    </filter>
    <radialGradient id="vignetteS" cx="50%" cy="39%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.055"></stop>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.34"></stop>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#baseSand)"></rect>

  <!-- dune shadows, same soft-blob language as the other two terrains -->
  <path d="M60 120 Q110 90 170 110 Q210 130 190 175 Q150 210 90 190 Q40 165 60 120 Z" fill="#5c4c2e" opacity="0.4"></path>
  <path d="M330 320 Q400 300 440 345 Q460 400 410 420 Q350 430 320 390 Q300 350 330 320 Z" fill="#5c4c2e" opacity="0.36"></path>
  <path d="M260 80 Q300 65 325 95 Q330 125 295 130 Q265 120 260 80 Z" fill="#5c4c2e" opacity="0.3"></path>
  <path d="M150 380 Q190 365 210 400 Q205 430 165 430 Q140 410 150 380 Z" fill="#4a3d25" opacity="0.3"></path>

  <!-- wind ripple lines -->
  <path d="M-10 265 Q160 215 260 275 T522 245" stroke="#6e5c39" stroke-width="4" fill="none" opacity="0.4"></path>
  <path d="M-10 320 Q160 285 260 320 T522 305" stroke="#6e5c39" stroke-width="3" fill="none" opacity="0.32"></path>
  <path d="M-10 190 Q160 165 260 195 T522 175" stroke="#c0aa78" stroke-width="3" fill="none" opacity="0.3"></path>

  <!-- scattered pebbles/dark specks, same density as the other terrains -->
  <ellipse cx="122" cy="70" rx="5" ry="3.5" fill="#4a3d25" opacity="0.55"></ellipse>
  <ellipse cx="232" cy="415" rx="5" ry="3.5" fill="#c0aa78" opacity="0.55"></ellipse>
  <ellipse cx="73" cy="119" rx="4" ry="2.8" fill="#4a3d25" opacity="0.5"></ellipse>
  <ellipse cx="440" cy="169" rx="4.5" ry="3.1" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="409" cy="111" rx="3" ry="2.1" fill="#c0aa78" opacity="0.5"></ellipse>
  <ellipse cx="111" cy="497" rx="2.2" ry="1.5" fill="#4a3d25" opacity="0.6"></ellipse>
  <ellipse cx="289" cy="39" rx="2.3" ry="1.6" fill="#5c4c2e" opacity="0.6"></ellipse>
  <ellipse cx="129" cy="274" rx="1.9" ry="1.3" fill="#c0aa78" opacity="0.6"></ellipse>
  <ellipse cx="49" cy="333" rx="3.4" ry="2.4" fill="#4a3d25" opacity="0.55"></ellipse>
  <ellipse cx="222" cy="235" rx="3.4" ry="2.4" fill="#4a3d25" opacity="0.5"></ellipse>
  <ellipse cx="459" cy="437" rx="2.9" ry="2" fill="#5c4c2e" opacity="0.45"></ellipse>
  <ellipse cx="440" cy="182" rx="3.9" ry="2.7" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="281" cy="287" rx="3.9" ry="2.7" fill="#c0aa78" opacity="0.5"></ellipse>
  <ellipse cx="418" cy="129" rx="1.9" ry="1.3" fill="#c0aa78" opacity="0.55"></ellipse>
  <ellipse cx="305" cy="87" rx="4" ry="2.8" fill="#c0aa78" opacity="0.4"></ellipse>
  <ellipse cx="510" cy="239" rx="4.1" ry="2.9" fill="#c0aa78" opacity="0.5"></ellipse>
  <ellipse cx="50" cy="417" rx="3.7" ry="2.6" fill="#5c4c2e" opacity="0.6"></ellipse>
  <ellipse cx="196" cy="90" rx="4.1" ry="2.8" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="439" cy="133" rx="4.4" ry="3.1" fill="#4a3d25" opacity="0.42"></ellipse>
  <ellipse cx="419" cy="319" rx="4.4" ry="3.1" fill="#c0aa78" opacity="0.55"></ellipse>
  <ellipse cx="157" cy="234" rx="4.5" ry="3.2" fill="#c0aa78" opacity="0.5"></ellipse>
  <ellipse cx="110" cy="11" rx="5.2" ry="3.6" fill="#5c4c2e" opacity="0.55"></ellipse>
  <ellipse cx="33" cy="392" rx="4" ry="2.8" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="231" cy="50" rx="5.7" ry="4" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="80" cy="429" rx="2.2" ry="1.5" fill="#4a3d25" opacity="0.45"></ellipse>
  <ellipse cx="471" cy="164" rx="3.2" ry="2.2" fill="#4a3d25" opacity="0.4"></ellipse>
  <ellipse cx="460" cy="92" rx="3.4" ry="2.4" fill="#5c4c2e" opacity="0.5"></ellipse>
  <ellipse cx="389" cy="404" rx="5.2" ry="3.6" fill="#c0aa78" opacity="0.55"></ellipse>

  <!-- a couple of sun-bleached bone/skull hints so it reads unmistakably as
       "desert boss arena", not just a lighter grass palette -->
  <ellipse cx="410" cy="440" rx="26" ry="8" fill="#e0d0a0" opacity="0.35"></ellipse>
  <path d="M395 440 Q410 425 425 440 Q418 450 402 450 Z" fill="#d8c896" opacity="0.4"></path>
  <ellipse cx="90" cy="60" rx="18" ry="6" fill="#e0d0a0" opacity="0.28"></ellipse>

  <rect width="512" height="512" fill="#808080" filter="url(#bumpS)" opacity="0.42" style="mix-blend-mode:overlay"></rect>
  <rect width="512" height="512" fill="url(#vignetteS)"></rect>
</svg>
