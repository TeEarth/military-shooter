  <circle cx="64" cy="46" r="20" fill="url(#helmetGradE)" stroke="#2c0f0f" stroke-width="2.5"/>
  <path d="M46 42 A18 18 0 0 1 82 42" fill="#2c0f0f" opacity="0.35"/>

  <!-- visor -->
