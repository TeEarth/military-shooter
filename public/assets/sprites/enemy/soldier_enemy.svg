  <rect x="58" y="88" width="12" height="10" rx="2" fill="#3a3a3a"/>

  <!-- arms -->
  <circle cx="38" cy="66" r="9" fill="#7a3232" stroke="#301010" stroke-width="2"/>
  <circle cx="90" cy="66" r="9" fill="#7a3232" stroke="#301010" stroke-width="2"/>

  <!-- warning rim -->
