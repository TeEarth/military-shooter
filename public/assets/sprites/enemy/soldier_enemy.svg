<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyGradE" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#8a3a3a"/>
      <stop offset="100%" stop-color="#5a2020"/>
    </radialGradient>
    <radialGradient id="helmetGradE" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9c4a45"/>
      <stop offset="100%" stop-color="#6a2825"/>
    </radialGradient>
  </defs>

  <ellipse cx="64" cy="100" rx="34" ry="10" fill="#000000" opacity="0.25"/>

  <!-- backpack -->
  <ellipse cx="64" cy="78" rx="22" ry="18" fill="#3a1c1c"/>

  <!-- body -->
  <circle cx="64" cy="64" r="34" fill="url(#bodyGradE)" stroke="#301010" stroke-width="2.5"/>

  <path d="M40 50 Q64 60 88 50" stroke="#301010" stroke-width="3" fill="none" opacity="0.6"/>
  <circle cx="64" cy="64" r="6" fill="#2b2b2b" stroke="#141414" stroke-width="1.5"/>

